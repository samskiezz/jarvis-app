# Fly.io deploy (https://fly.io). Alternative to Render — global, fast, has a
# free allowance. The backend serves the API + 3D web app on one port with a
# persistent volume for the SQLite DB.
#
# Deploy:
#   cd underworld
#   fly launch --no-deploy        # creates the app (accept this fly.toml)
#   fly volumes create underworld_data --size 1
#   fly secrets set UNDERWORLD_API_KEY=$(openssl rand -hex 24)
#   # optional, for real LLM minds:
#   fly secrets set UNDERWORLD_KIMI_API_KEY=sk-...
#   fly deploy

app = "underworld"
primary_region = "syd"          # Sydney — change to your nearest region

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  UNDERWORLD_DB_PATH = "/data/underworld.db"
  UNDERWORLD_SCHEDULER_ENABLED = "true"
  UNDERWORLD_KIMI_BASE_URL = "https://api.moonshot.ai/v1"
  UNDERWORLD_KIMI_MODEL = "moonshot-v1-32k"

[[mounts]]
  source = "underworld_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"   # suspend when idle; the scheduler resumes on hit
  auto_start_machines = true
  min_machines_running = 1         # keep 1 alive so the world keeps ticking
  [http_service.checks]
    [http_service.checks.health]
      path = "/healthz"
      interval = "30s"
      timeout = "5s"
