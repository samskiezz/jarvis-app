[/Script/EngineSettings.GeneralProjectSettings]
ProjectName=Underworld Minions

[/Script/UnrealEd.ProjectPackagingSettings]
; The imported GLB meshes (/Game/UnderworldAssets) are referenced only by runtime string
; (category+name resolved from the φ/fractal layout), so nothing hard-references them and
; the cooker would skip them. Force them into the package so the streamed world has its
; buildings. import_glbs.py populates this tree.
+DirectoriesToAlwaysCook=(Path="/Game/UnderworldAssets")
bCookAll=False
; stage manifest.json (non-.uasset) into the .pak so the C++ resolver can read it at runtime
+DirectoriesToAlwaysStageAsUFS=(Path="UnderworldAssets")
