; Underworld UE5 — engine config tuned for a Sims-4-grade stylised look that
; streams cleanly. Lumen + Nanite on, hardware ray tracing where available,
; virtual shadow maps, NVENC hardware encode. The C++ GameMode is the default.

[/Script/EngineSettings.GameMapsSettings]
; JARVIS HUD is the streamed product (override per-cook with -map / runtime arg for Underworld).
; A plain GameModeBase suits the holographic chamber — the orbit CameraActor (auto-activate
; for Player0) owns the Pixel-Streaming view; no Underworld pawn/controller needed.
GlobalDefaultGameMode=/Script/Engine.GameModeBase
GameDefaultMap=/Game/Maps/JarvisHUD.JarvisHUD
EditorStartupMap=/Game/Maps/JarvisHUD.JarvisHUD
ServerDefaultMap=/Game/Maps/JarvisHUD.JarvisHUD

[DevOptions.Shaders]
; Throttle shader-compile fan-out so the cook's global-shader phase fits the 31GB box.
; On 8 cores, leaving 6 unused -> ~2 ShaderCompileWorkers (the default 8 OOM'd the cook).
NumUnusedShaderCompilingThreads=6
NumUnusedShaderCompilingThreadsDuringGame=6
MaxShaderJobBatchSize=8
bPromptToRetryFailedShaderCompiles=False

[/Script/Engine.RendererSettings]
; Stylised-but-modern: Lumen GI/reflections give the soft, cohesive Sims look
r.DynamicGlobalIlluminationMethod=1            ; Lumen
r.ReflectionMethod=1                           ; Lumen reflections
r.Nanite.ProjectEnabled=True
r.RayTracing=True
r.RayTracing.Shadows=True
r.Lumen.HardwareRayTracing=True                ; falls back to software if no RT GPU
r.Shadow.Virtual.Enable=1                       ; Virtual Shadow Maps
r.AntiAliasingMethod=4                          ; TSR — clean edges over a stream
r.DefaultFeature.Bloom=True
r.DefaultFeature.AmbientOcclusion=True
r.DefaultFeature.AutoExposure=False            ; fixed exposure = the readable Sims grade
r.MotionBlurQuality=0                           ; off — crisper streamed frames
r.GenerateMeshDistanceFields=True
r.SkinCache.CompileShaders=True                 ; required for RT on the skeletal minions
r.Streaming.PoolSize=2048

; ── GTA5-class gap fixes (see JARVIS-RENDER-GAP-AUDIT.md) ──────────────────────
r.VolumetricFog=1                               ; god rays / light shafts through the holograms
r.VolumetricFog.GridPixelSize=8                 ; finer shafts (default 16 is blocky)
r.RayTracing.Translucency=1                     ; holograms are translucent — refract/reflect properly
r.Lumen.Reflections.Quality=4                   ; cleaner reflections on the glossy dais
r.Lumen.ScreenProbeGather.RadianceCache.ProbeResolution=32
r.Lumen.TraceMeshSDFs=1                         ; better GI detail from the imported props
r.ContactShadows=1                              ; small-scale grounding of props
r.LocalExposure.HighlightContrastScale=0.8      ; HDR-ish pop without auto-exposure flicker
r.LocalExposure.ShadowContrastScale=0.9
r.Bloom.ScreenPercentage=50                     ; higher-res bloom kernel (default 25)
r.SceneColorFringeQuality=1                     ; subtle chromatic aberration (filmic edge)

[/Script/PixelStreaming.PixelStreamingSettings]
PixelStreamingEncoderCodec=H264
PixelStreamingEncoderTargetBitrate=-1
PixelStreamingEncoderMaxBitrate=20000000
PixelStreamingWebRTCFps=60
PixelStreamingEncoderMinQP=10
PixelStreamingEncoderMaxQP=24                   ; quality ceiling for crisp UI text

[SystemSettings]
; Headless server render: no window, GPU offscreen
r.SetRes=1920x1080
r.VSync=0

