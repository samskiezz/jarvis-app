# turnserver.conf — coturn on the Hostinger control box. Pixel Streaming WebRTC tries a
# direct peer path first; when the player is behind a strict/symmetric NAT, media relays
# through this TURN server so the stream still connects. Point the Pixel Streaming
# SignallingWebServer config (peerConnectionOptions.iceServers) at turn:<DOMAIN>:3478.
#
# Install:  apt-get install -y coturn
#           set TURNSERVER_ENABLED=1 in /etc/default/coturn
#           systemctl enable --now coturn
# Open UDP/TCP 3478 and the relay range 49160-49200 in the firewall.

listening-port=3478
tls-listening-port=5349

# fill these for your box (orchestrate.sh can template them):
listening-ip=0.0.0.0
# external-ip=__CONTROL_PUBLIC_IP__         # the Hostinger box public IP
# realm=__DOMAIN__

fingerprint
lt-cred-mech
# long-term credential — change these and mirror into the signalling iceServers config:
user=underworld:CHANGE_ME_STRONG_SECRET

# relay port window (keep small, open in firewall)
min-port=49160
max-port=49200

# certs for TURNS/TLS (reuse the nginx letsencrypt certs)
# cert=/etc/letsencrypt/live/__DOMAIN__/fullchain.pem
# pkey=/etc/letsencrypt/live/__DOMAIN__/privkey.pem

no-cli
no-multicast-peers
stale-nonce=600
verbose
