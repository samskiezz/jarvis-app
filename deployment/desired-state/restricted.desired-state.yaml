apiVersion: control.jarvis/v1
kind: EnvironmentDesiredState
metadata:
  name: restricted
  description: Sovereign / classified enclave. SECRET-handling, compartmented, no egress.
  owner: control-plane
  reference_impl: server/services/jarvis_apollo.py
  contract: contracts/openapi/control-plane-api.yaml
  state_table: control.environment
spec:
  environment_id: env-restricted
  tenant_id: tenant-gov-secret
  tier: 2
  region: sovereign-1
  network_zone: classified
  classification_level: SECRET
  required_services:
    - control-plane
    - security-plane
    - event-plane
    - data-plane
    - ontology-plane
    - object-runtime
    - entity-resolution-plane
    - workflow-plane
    - action-plane
    - observability-plane
  service_versions:
    control-plane: 1.4.0
    security-plane: 1.4.0
    event-plane: 1.4.0
    data-plane: 1.4.0
    ontology-plane: 1.4.0
    object-runtime: 1.4.0
    entity-resolution-plane: 1.4.0
    workflow-plane: 1.4.0
    action-plane: 1.4.0
    observability-plane: 1.4.0
  policy_bundle_versions:
    action-execution: 1.0.0
    object-read: 1.0.0
    property-read: 1.0.0
    link-traversal: 1.0.0
    model-access: 1.0.0
    tool-execution: 1.0.0
    export: 1.0.0
  canary_policy:
    enabled: true
    strategy: blue-green
    ref: deployment/rollout-policies/blue-green.yaml
  rollback_policy:
    auto_rollback: true
    on_health_gate_fail: revert_to_last_good_version
    refs:
      - deployment/rollback-policies/service-rollback.yaml
      - deployment/rollback-policies/database-rollback.yaml
      - deployment/rollback-policies/ontology-rollback.yaml
      - deployment/rollback-policies/model-rollback.yaml
  health_gates:
    - id: liveness
      type: http
      path: /healthz
      threshold: "200"
    - id: error_rate
      type: metric
      metric: http_5xx_ratio
      max: 0.005
      window: 5m
    - id: audit_chain_intact
      type: invariant
      check: audit_hash_chain_verifies
    - id: classification_leak_scan
      type: invariant
      check: no_classification_downgrade_detected
    - id: egress_blocked
      type: invariant
      check: no_external_egress_observed
  approval_requirements:
    required: true
    approvers:
      - role: release-manager
      - role: security-officer
      - role: classification-authority
    quorum: 3
    break_glass: deployment/../governance/security/break-glass-policy.md
  offline_update_rules:
    enabled: true
    bundle_signature_required: true
    two_person_import: true
    air_gap: false
    max_staleness: 7d
    boot_profile: deployment/boot-profiles/restricted.yaml
