# Control-plane local stack for the Enterprise OS.
#
# Brings up the authoritative-state and event-backbone substrates the JVM control
# plane depends on (Layer 1/2/5/6/7/15). Postgres + Redpanda run fine in a
# lightweight sandbox. The control-plane-service is a build-context placeholder:
# the JVM image is not built here (see note on the service).
#
# Reference (Layer A) behaviour lives under server/; this compose targets Layer B.

name: enterprise-os-control-plane

services:
  postgres:
    # Authoritative metadata store (platform_control, platform_deployment, ...).
    # Layer 5 (Postgres authoritative state) per ADR-005.
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: enterprise
      POSTGRES_PASSWORD: enterprise
      POSTGRES_DB: platform_control
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enterprise -d platform_control"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    # Kafka-compatible event backbone (Layer 15) per ADR-003. Redpanda is used as a
    # lightweight, single-binary Kafka substitute that runs in a sandbox; the event
    # envelope contract is contracts/events/event-envelope.schema.json.
    image: redpandadata/redpanda:v24.1.7
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 15s
      timeout: 5s
      retries: 5

  control-plane-service:
    # Layer 1 Apollo delivery fabric — JVM hub (control-plane-service + Go agents).
    # PLACEHOLDER: the JVM image is not built in this file. When the Gradle build
    # produces an image, point `build.context` at ./control-plane and supply the
    # Dockerfile there. Until then this service is declared but commented out so the
    # compose file stays parseable and the substrates above can run standalone.
    #
    # Layer B: requires real infra (built JVM image, JDK 21 runtime).
    #
    # build:
    #   context: ./control-plane
    #   dockerfile: Dockerfile
    image: enterprise-os/control-plane-service:0.1.0-SNAPSHOT
    profiles:
      - jvm
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://enterprise:enterprise@postgres:5432/platform_control
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"

volumes:
  postgres-data:
