<!doctype html><html lang=en><head><meta charset=utf-8>
<title>JARVIS · UNIVERSE</title>
<meta name=viewport content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name=theme-color content="#03050A">
<style>
:root{--cy:#29E7FF;--cy2:#7af3ff;--ok:#34d399;--am:#f5b942;--rd:#ff5d6c;--pu:#a78bfa;--bg:#02040a;--tx:#dff6ff;--dim:#5f8298;--glass:rgba(8,22,34,.62);--ln:rgba(41,231,255,.22)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:var(--bg);color:var(--tx);overflow:hidden;
 font-family:'Inter',ui-rounded,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:13px}
.mono{font-family:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace}
/* the ONE universe */
#uni{position:fixed;inset:0;z-index:0;display:block;width:100vw;height:100vh;touch-action:none}
/* ---------- thin top bar ---------- */
#top{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:12px;
 padding:11px 18px;background:linear-gradient(180deg,rgba(2,6,12,.82),transparent);pointer-events:none}
#top>*{pointer-events:auto}
#top .brand{font-weight:800;letter-spacing:5px;font-size:15px;color:#eafcff;text-shadow:0 0 18px var(--cy)}
#top .brand b{color:var(--cy)}
.chip{font-size:11px;font-weight:700;letter-spacing:.5px;padding:4px 11px;border-radius:999px;background:var(--glass);border:1px solid var(--ln);color:var(--cy)}
.chip.ok{color:var(--ok);border-color:#1c5b46}.chip.bad{color:var(--rd);border-color:#5b1c2a;animation:bl .8s steps(2) infinite}
@keyframes bl{50%{opacity:.4}}
#top .sp{flex:1}
#search{width:min(280px,40vw);background:rgba(2,10,16,.7);border:1px solid var(--ln);border-radius:12px;color:#eafcff;padding:8px 13px;font-size:13px;outline:none}
#search:focus{border-color:var(--cy);box-shadow:0 0 16px rgba(41,231,255,.25)}
.tbtn{font-size:11px;font-weight:700;padding:6px 11px;border-radius:9px;border:1px solid var(--ln);background:var(--glass);color:var(--tx);cursor:pointer;backdrop-filter:blur(6px)}
.tbtn:hover{border-color:var(--cy);color:var(--cy);box-shadow:0 0 16px rgba(41,231,255,.3)}
.tbtn.g{color:var(--ok);border-color:#1c5b46}.tbtn.r{color:var(--rd);border-color:#5b1c2a}.tbtn.a{color:var(--am);border-color:#6b561e}
/* ---------- single contextual info card (NASA-Eyes style, NOT side tabs) ---------- */
#card{position:fixed;left:22px;bottom:96px;z-index:24;width:min(380px,90vw);max-height:64vh;overflow:auto;
 background:var(--glass);border:1px solid var(--cy);border-radius:16px;padding:16px 17px;backdrop-filter:blur(16px);
 box-shadow:0 0 0 1px rgba(0,0,0,.4),0 18px 60px rgba(0,0,0,.6),0 0 40px rgba(41,231,255,.16);
 transform:translateY(20px) scale(.96);opacity:0;pointer-events:none;transition:transform .32s cubic-bezier(.22,1,.36,1),opacity .28s}
#card.open{transform:none;opacity:1;pointer-events:auto}
#card .x{position:absolute;top:12px;right:14px;cursor:pointer;color:var(--dim);font-size:18px;line-height:1}
#card .x:hover{color:var(--cy)}
#card .t{font-size:15px;color:var(--cy);margin:0 28px 3px 0;letter-spacing:.5px;font-weight:700}
#card .s{font-size:10.5px;color:var(--dim);letter-spacing:.4px;margin-bottom:10px}
#card .prop{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px solid rgba(41,231,255,.1);font-size:12px}
#card .prop .k{color:var(--dim)}#card .prop b{color:#eafcff;text-align:right;word-break:break-word}
#card .l{font-size:11.5px;color:#bfe6f2;padding:3px 0;font-family:'JetBrains Mono',monospace;white-space:pre-wrap;word-break:break-word;cursor:default}
#card .acts{margin-top:9px}
#card .act{display:inline-block;margin:5px 6px 0 0;font-size:11px;font-weight:700;padding:7px 11px;border-radius:9px;border:1px solid var(--ln);background:rgba(41,231,255,.1);color:var(--cy);cursor:pointer}
#card .act:hover{box-shadow:0 0 16px rgba(41,231,255,.3)}
#card .bar2{height:7px;background:rgba(41,231,255,.1);border-radius:4px;overflow:hidden;margin:7px 0}
#card .fill{height:100%;background:linear-gradient(90deg,#0ea5b7,var(--cy));box-shadow:0 0 10px var(--cy)}
#filebody{white-space:pre-wrap;font-family:'JetBrains Mono',monospace;font-size:11px;color:#bfe6f2;max-height:42vh;overflow:auto;background:rgba(2,10,16,.6);border:1px solid var(--ln);border-radius:8px;padding:10px;margin-top:8px}
/* ---------- bottom talk bar (preserved voice) ---------- */
#cmd{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:25;width:min(760px,94vw);
 background:var(--glass);border:1px solid var(--ln);border-radius:18px;padding:9px 10px;backdrop-filter:blur(14px);
 box-shadow:0 0 0 1px rgba(0,0,0,.4),0 18px 60px rgba(0,0,0,.6),0 0 40px rgba(41,231,255,.12)}
#cmd .row1{display:flex;gap:8px;align-items:center}
#say{flex:1;background:rgba(2,10,16,.7);border:1px solid var(--ln);border-radius:12px;color:#eafcff;
 padding:13px 15px;font-size:15px;outline:none}
#say:focus{border-color:var(--cy);box-shadow:0 0 18px rgba(41,231,255,.25)}
#mic{width:52px;height:52px;flex:none;border-radius:50%;border:2px solid var(--cy);background:rgba(41,231,255,.1);
 color:var(--cy);font-size:23px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#mic.live{background:rgba(52,211,153,.18);border-color:var(--ok);color:var(--ok);animation:micp 1.2s infinite}
@keyframes micp{0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,.5)}50%{box-shadow:0 0 0 12px rgba(52,211,153,0)}}
.send{width:52px;height:52px;flex:none;border-radius:14px;border:1px solid var(--ln);background:rgba(41,231,255,.12);color:var(--cy);font-size:19px;cursor:pointer}
.send:hover{box-shadow:0 0 18px rgba(41,231,255,.3)}
#cmd .row2{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap}
.mini{font-size:10.5px;font-weight:700;padding:6px 10px;border-radius:9px;border:1px solid var(--ln);background:rgba(2,10,16,.5);color:var(--tx);cursor:pointer}
.mini:hover{border-color:var(--cy);color:var(--cy)}
.mini.archon{margin-left:auto}.mini.archon.on{background:linear-gradient(90deg,#7a3bff33,#29e7ff22);border-color:var(--pu);color:#cdb4ff;box-shadow:0 0 16px rgba(167,139,250,.4)}
#budget{font-size:9.5px;color:var(--dim)}
#budget b{color:var(--ok)}
#coreSay{position:fixed;left:50%;bottom:108px;transform:translateX(-50%);z-index:23;font-size:12px;color:var(--cy2);
 max-width:60vw;text-align:center;min-height:14px;text-shadow:0 0 12px rgba(41,231,255,.5);pointer-events:none}
/* ---------- WebRTC / studio overlays (preserved) ---------- */
.ov{position:fixed;inset:0;z-index:30;display:none;background:rgba(3,5,10,.92);backdrop-filter:blur(4px)}
.ov.open{display:block}
.ov iframe{width:100%;height:100%;border:0;display:block}
.ov .close{position:absolute;top:16px;right:18px;z-index:5;font-size:13px;font-weight:700;color:var(--cy);background:var(--glass);border:1px solid var(--cy);border-radius:9px;padding:7px 13px;cursor:pointer}
#libgrid{position:absolute;inset:60px 24px 24px;overflow:auto;display:flex;gap:12px;flex-wrap:wrap;align-content:flex-start}
#libgrid .it{width:150px}
#libgrid img,#libgrid model-viewer{width:150px;height:150px;border:1px solid var(--ln);border-radius:10px;background:#04101a;object-fit:cover}
.ovtitle{position:absolute;top:18px;left:24px;color:var(--cy);letter-spacing:2px;font-size:13px}
/* boot */
#boot{position:fixed;inset:0;z-index:90;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity .9s}
#boot.gone{opacity:0;pointer-events:none}
#boot .ring{width:120px;height:120px;border-radius:50%;border:2px solid rgba(41,231,255,.25);border-top-color:var(--cy);animation:spin 1.1s linear infinite;box-shadow:0 0 40px rgba(41,231,255,.4)}
@keyframes spin{to{transform:rotate(360deg)}}
#boot .t{font-size:13px;letter-spacing:6px;color:var(--cy);text-shadow:0 0 16px var(--cy)}
#boot .tap{font-size:11px;color:var(--dim)}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-thumb{background:rgba(41,231,255,.25);border-radius:4px}
@media(max-width:820px){#search{width:34vw}#card{width:88vw}}
</style></head>
<body>
<!-- the ONE immersive WebGL universe -->
<canvas id=uni></canvas>

<!-- thin top bar -->
<div id=top>
 <div class=brand>J<b>A</b>RVIS<b>·</b>LIVE</div>
 <span class="chip ok" id=status>● ONLINE</span>
 <span class="chip mono" id=age>—</span>
 <input id=search placeholder="Search / fly to…" autocomplete=off onkeydown="if(event.key==='Enter')flyToQuery(this.value)">
 <span class=sp></span>
 <button class="tbtn g" onclick="cmdAll('run')">▶ Run</button>
 <button class="tbtn a" onclick="cmdAll('pause')">⏸ Pause</button>
 <button class="tbtn r" onclick="cmdAll('stop')">⏹ Stop</button>
 <button class=tbtn onclick="cmdAll('sleep')">🌙 Sleep</button>
</div>

<!-- single contextual info card (hidden until a body is clicked) -->
<div id=card>
 <span class=x onclick="closeCard()">✕</span>
 <div class=t></div><div class=s></div>
 <div class=props></div><div class=lines></div><div class=acts></div><div class=filewrap></div>
</div>

<!-- spoken-line readout -->
<div id=coreSay aria-live=polite></div>

<!-- bottom talk-to-JARVIS bar (voice preserved) -->
<div id=cmd>
 <div class=row1>
   <input id=say placeholder="Talk to JARVIS…" aria-label="Talk to Jarvis" autocomplete=off onkeydown="if(event.key==='Enter')askJarvis()">
   <button id=mic onclick=micToggle() aria-label="Hold-free voice" title="Voice">🎤</button>
   <button class=send onclick=askJarvis() aria-label=Send title=Send>➤</button>
 </div>
 <div class=row2>
   <button class=mini onclick="quick('image')">🎨 Image</button>
   <button class=mini onclick="quick('3d')">🧊 3D GLB</button>
   <button class=mini onclick="readStatus()">🔊 Status</button>
   <button class=mini onclick="setMode('guardian')">🛡 Guardian</button>
   <button class=mini onclick="setMode('library')">🖼 Studio</button>
   <span id=budget class=mono></span>
   <button class="mini archon" id=archonBtn onclick=toggleArchon() title="Archon: max tokens / Opus for hard tasks">⚡ ARCHON</button>
 </div>
</div>

<!-- WebRTC + studio overlays -->
<div class=ov id=ovGuardian><button class=close onclick="setMode('live')">✕ Close</button><iframe id=guardFrame allow="camera;microphone;autoplay"></iframe></div>
<div class=ov id=ovLib><button class=close onclick="setMode('live')">✕ Close</button>
  <div class=ovtitle>🎨 JARVIS STUDIO · LIBRARY <span style="color:var(--dim)">· images &amp; 3D models you created</span></div>
  <div id=libgrid></div></div>

<!-- boot -->
<div id=boot><div class=ring></div><div class=t>INITIALIZING JARVIS</div><div class=tap>tap anywhere to engage the universe</div></div>
<div class=sr aria-live=assertive id=srlog></div>

<!-- model-viewer only for the Studio overlay -->
<script src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js" type=module></script>
<!-- proven three@0.149 UMD chain (same as dashboard_graph.html) + GLTFLoader + OrbitControls -->
<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.149.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.149.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.149.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://unpkg.com/three@0.149.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://unpkg.com/three@0.149.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.149.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.149.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://unpkg.com/three@0.149.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script>
const $=id=>document.getElementById(id), CT="e0c95a805d23d196";
const fmt=n=>n==null?'—':(+n).toLocaleString();
function esc(s){return (s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let _m={},_ts=0,archon=false,_engaged=false;
function srlog(t){const s=$('srlog');if(s){s.textContent='';setTimeout(()=>s.textContent=t,50);}}

/* ================= PRESERVED: British JARVIS voice (verbatim) ================= */
let VOICES=[];function loadVoices(){VOICES=speechSynthesis.getVoices()||[];}
loadVoices();if('onvoiceschanged' in speechSynthesis)speechSynthesis.onvoiceschanged=loadVoices;
function pickVoice(){const pref=['Daniel','Google UK English Male','Microsoft Ryan','Microsoft George','Arthur','Oliver'];
 for(const p of pref){const v=VOICES.find(v=>v.name&&v.name.includes(p));if(v)return v;}
 return VOICES.find(v=>/en[-_]?GB/i.test(v.lang))||VOICES.find(v=>/^en/i.test(v.lang))||VOICES[0];}
let _ttsAudio=null,_ttsCtx=null,_ttsSrc=null,_ttsAn=null,_ttsData=null,_chatHist=[];
function unlockAudio(){try{if(!_ttsCtx){_ttsAudio=new Audio();_ttsCtx=new(window.AudioContext||window.webkitAudioContext)();
  _ttsSrc=_ttsCtx.createMediaElementSource(_ttsAudio);_ttsAn=_ttsCtx.createAnalyser();_ttsAn.fftSize=128;
  _ttsSrc.connect(_ttsAn);_ttsAn.connect(_ttsCtx.destination);_ttsData=new Uint8Array(_ttsAn.frequencyBinCount);}
  if(_ttsCtx.resume)_ttsCtx.resume();}catch(e){}}
function webSpeakFallback(t){try{const u=new SpeechSynthesisUtterance(t);const v=pickVoice();if(v){u.voice=v;u.lang=v.lang||'en-GB';}u.rate=.99;u.pitch=1.0;u.onstart=speakStart;u.onend=speakEnd;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){speakEnd();}}
window.jarvisSpeak=function(t){if(!t)return;try{srlog(t);}catch(e){}
  try{ if(!_ttsCtx)unlockAudio();
    speakStart();
    _ttsAudio.onended=()=>speakEnd();
    _ttsAudio.onerror=()=>webSpeakFallback(t);
    _ttsAudio.src='tts?text='+encodeURIComponent(String(t).slice(0,600));
    if(_ttsCtx&&_ttsCtx.resume)_ttsCtx.resume();
    _ttsAudio.play().catch(()=>webSpeakFallback(t));
  }catch(e){webSpeakFallback(t);} }
function speakStart(){document.body.classList.add('speaking');spkAmp=.7;$('coreSay').textContent='';}
function speakEnd(){document.body.classList.remove('speaking');spkAmp=0;}

/* ================= voice amp envelope (consumed by the brain via currentAmp/setAmp) ================= */
let spkAmp=0, micAmp=0, analyser=null, micData=null, _ampExt=0;
window.setAmp=a=>{_ampExt=+a||0;};
function currentAmp(){
  // prefer the live TTS-audio analyser when speaking (plain reused <audio>, proven path)
  if(_ttsAn&&document.body.classList.contains('speaking')){
    try{_ttsAn.getByteFrequencyData(_ttsData);let s=0;for(let i=0;i<_ttsData.length;i++)s+=_ttsData[i];
      const a=Math.min(1,(s/_ttsData.length)/96);if(a>0)spkAmp=Math.max(spkAmp,a);}catch(e){}
  }
  if(analyser){analyser.getByteFrequencyData(micData);let s=0;for(let i=0;i<micData.length;i++)s+=micData[i];
    micAmp=Math.min(1,(s/micData.length)/110);}
  const breathe=.14+.05*Math.sin(performance.now()/900);
  if(spkAmp>0)spkAmp=Math.max(0,spkAmp-.012);
  return Math.max(breathe, spkAmp*.95, micAmp*.9, _ampExt);
}

/* ================= PRESERVED: chat / Claude (back-to-back, build-routing server-side) ================= */
function bubble(who,txt){const t=(who==='You'?'You':'JARVIS')+': '+txt;$('coreSay').textContent=(who==='You'?'» ':'')+ (txt+'').replace(/<[^>]+>/g,'').slice(0,140);srlog(t);}
async function askJarvis(){const t=($('say').value||'').trim();if(!t)return;
  const l=t.toLowerCase();$('say').value='';
  // voice/command shortcuts (preserved)
  if(/^(image|picture|draw)\b/.test(l)){return runMedia('genimage',t.replace(/^(image|picture|draw)\s*(of)?\s*/i,''));}
  if(/\b3d\b|^(model|sculpt)\b/.test(l)){return runMedia('gen3d',t.replace(/\b3d\b|model|sculpt/ig,'').trim());}
  if(l.includes('run all'))return cmdAll('run');if(l==='stop'||l.includes('stop all'))return cmdAll('stop');
  if(l.includes('sleep'))return cmdAll('sleep');if(l==='status'||l.includes('read status'))return readStatus();
  if(l.includes('guardian')||l.includes('mum')||l.includes('mother'))return setMode('guardian');
  if(l.includes('graph'))return flyToQuery('graph');
  unlockAudio();bubble('You',esc(t));$('coreSay').textContent='…';
  try{const r=await(await fetch('chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({q:t,history:_chatHist.slice(-8),address:'sir'})})).json();
    const reply=(r&&r.reply)||"I'm here, sir.";_chatHist.push({role:'user',content:t});_chatHist.push({role:'assistant',content:reply});
    bubble('JARVIS',esc(reply));jarvisSpeak(reply);
  }catch(e){bubble('JARVIS','connection error');}}
function pollClaude(id){const iv=setInterval(async()=>{try{const r=await(await fetch('taskresult?id='+id)).json();
   if(r.status&&r.status!=='running'&&r.status!=='paused'){clearInterval(iv);
     const txt=(r.text||'(done)').slice(-2000);bubble('JARVIS',esc(txt));
     jarvisSpeak(txt.replace(/<[^>]+>/g,'').slice(0,420));loadLib();}}catch(e){}},3000);}

/* media (preserved) */
async function quick(kind){const t=prompt(kind==='image'?'Describe the image:':'Describe the 3D model:');if(t)runMedia(kind==='image'?'genimage':'gen3d',t);}
async function runMedia(action,t){if(!t)return;bubble('You',(action==='gen3d'?'🧊 ':'🎨 ')+esc(t));
  jarvisSpeak(action==='gen3d'?'Generating a 3D model. This can take a few minutes — it will not time out.':'Generating your image now.');
  try{await fetch('task?action='+action+'&q='+encodeURIComponent(t)+'&token='+CT,{method:'POST'});}catch(e){}
  setTimeout(loadLib,1500);}

/* commands (preserved) */
async function cmdAll(a){jarvisSpeak(a==='run'?'Running all systems.':a==='stop'?'Stopping all.':a==='sleep'?'Entering sleep mode.':'Pausing.');
  try{await fetch('control_all?action='+a+'&token='+CT,{method:'POST'});}catch(e){}setTimeout(tick,900);}
async function ctl(a,n){try{await fetch('control?action='+a+'&name='+encodeURIComponent(n)+'&token='+CT,{method:'POST'});}catch(e){}setTimeout(tick,800);}
function readStatus(){const c=_m.completion||{},X=_m.correlation||{},on=(_m.workers||[]).filter(w=>w.toggleable&&w.status==='online').length;
  jarvisSpeak('Status. Knowledge build '+(c.pct||0)+' percent. '+on+' pipelines online. '+fmt(X.distinct_after_dedup)+' distinct entities. Box V-RAM '+((_m.box||{}).vram_used_gb||0)+' of 48 gigabytes.');}

/* archon (preserved) */
function toggleArchon(){archon=!archon;$('archonBtn').classList.toggle('on',archon);
  jarvisSpeak(archon?'Archon mode engaged. Maximum capability for hard tasks.':'Archon mode off.');}

/* ================= mic (preserved verbatim) ================= */
let _rec=null;
async function startMicAnalyser(){try{const s=await navigator.mediaDevices.getUserMedia({audio:true});
   const ac=new(window.AudioContext||window.webkitAudioContext)();const src=ac.createMediaStreamSource(s);
   analyser=ac.createAnalyser();analyser.fftSize=128;micData=new Uint8Array(analyser.frequencyBinCount);src.connect(analyser);}catch(e){}}
function micToggle(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){jarvisSpeak('Voice input needs Chrome or Edge.');return;}
  if(_rec){try{_rec.stop();}catch(e){}_rec=null;$('mic').classList.remove('live');document.body.classList.remove('listening');return;}
  startMicAnalyser();
  _rec=new SR();_rec.lang='en-GB';_rec.continuous=true;_rec.interimResults=true;
  $('mic').classList.add('live');document.body.classList.add('listening');jarvisSpeak('Listening.');
  _rec.onresult=e=>{const res=e.results[e.results.length-1];const t=res[0].transcript.trim();
    $('coreSay').textContent=t;if(res.isFinal&&t){$('say').value=t;askJarvis();}};
  _rec.onerror=ev=>{if(ev.error==='not-allowed'){jarvisSpeak('Please allow microphone access.');_rec=null;$('mic').classList.remove('live');}};
  _rec.onend=()=>{if(_rec){try{_rec.start();}catch(e){}}};
  _rec.start();}

/* ================= PRESERVED: overlays / Guardian WebRTC (negotiation untouched) ================= */
function setMode(mode,arg){
  ['ovGuardian','ovLib'].forEach(id=>$(id).classList.remove('open'));
  if(mode==='guardian'){if(!$('guardFrame').src)$('guardFrame').src='guardian?room=mum';$('ovGuardian').classList.add('open');jarvisSpeak('Opening the Guardian monitor for your mother.');}
  else if(mode==='library'){loadLib();$('ovLib').classList.add('open');}
  // 'live' just closes overlays
}
async function loadLib(){try{const lib=await(await fetch('library')).json();
   $('libgrid').innerHTML=(lib&&lib.length)?lib.map(m=>m.file.endsWith('.glb')
     ?'<div class=it><model-viewer src="media/'+m.file+'" camera-controls auto-rotate ar interaction-prompt=none style="--poster-color:transparent"></model-viewer><div style="color:var(--dim);font-size:9.5px">'+esc((m.prompt||'').slice(0,40))+'</div></div>'

function cardEl(sel){return $('card').querySelector(sel);}

function showCard(o){

  cardEl('.props').innerHTML=(o.props||[]).map(p=>'<div class=prop><span class=k>'+esc(p.k)+'</span><b>'+esc(String(p.v))+'</b></div>').join('');

// async drill via /detail (kind=runner|type|module) — fills the SAME card
async function openDetail(kind,name){
  showCard({title:name||kind,subtitle:'loading…'});
  try{const d=await(await fetch('detail?kind='+encodeURIComponent(kind)+'&name='+encodeURIComponent(name||''))).json();
   const acts=[].concat((d.links||[]).map(x=>Object.assign({},x,{_link:1})),(d.actions||[]));
   showCard({title:d.title||name||kind,subtitle:d.subtitle||'',props:d.props||[],lines:d.lines||[],actions:acts});
  }catch(e){showCard({title:name||kind,subtitle:'no detail available'});}}
function doAction(a){if(!a)return;const k=a.kind,arg=a.arg;
  if(k==='drill'){const [kk,...r]=String(arg).split(':');openDetail(kk,r.join(':'));}
  else if(k==='file')openFile(arg);
  else if(k==='media'){window.open('media/'+arg,'_blank');}
  else if(k==='url'){window.open(arg,'_blank');}
  else if(k==='graph'){flyToNode(arg);}                 // graph action flies to constellation node (no iframe)
  else if(k==='task'){$('say').value=arg;askJarvis();}
  else if(k==='open'){window.open(arg,'_blank');}}
async function openFile(path){try{const d=await(await fetch('file?path='+encodeURIComponent(path))).json();
   showCard({title:d.path||path,subtitle:(d.lang||'')+' · '+fmt(d.size)+' bytes'});
   cardEl('.filewrap').innerHTML='<div id=filebody></div>';$('filebody').textContent=d.content||'(empty / unreadable)';

const THREE=window.THREE;
let scene,camera,renderer,controls,composer,bloom,brain,coreMesh=null,torus=null,beamMat=null;

const ASSET=n=>'asset/'+n;
const COLORS={core:0x29e7ff,kpi:0x29e7ff,infra:0x7af3ff,pipe:0x34d399,pipeOff:0xff5d6c,tier:0xa78bfa,sys:0xf5b942,guardian:0x34d399};

function initUniverse(){
  const canvas=$('uni');
  try{ renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false}); }
  catch(e){ return false; }                                   // no WebGL → caller keeps boot text, never blanks
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  try{renderer.toneMapping=THREE.ACESFilmicToneMapping;}catch(e){}
  scene=new THREE.Scene();
  try{scene.fog=new THREE.FogExp2(0x02040a,0.0012);}catch(e){}
  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,4000);
  camera.position.copy(home.pos);
  controls=new THREE.OrbitControls(camera,canvas);
  controls.enableDamping=true;controls.dampingFactor=.06;
  controls.minDistance=60;controls.maxDistance=1400;controls.target.copy(home.tgt);

  composer=new THREE.EffectComposer(renderer);
  composer.addPass(new THREE.RenderPass(scene,camera));
  try{bloom=new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.6,0.85,0.0);composer.addPass(bloom);}
  catch(e){bloom=null;}

  scene.add(new THREE.AmbientLight(0x223344,0.7));
  const key=new THREE.PointLight(0x29e7ff,2.2,800);key.position.set(0,140,160);scene.add(key);
  const rim=new THREE.PointLight(0x7af3ff,1.1,900);rim.position.set(-160,40,-120);scene.add(rim);

  // starfield (depth)
  const sg=new THREE.BufferGeometry();const sp=new Float32Array(6000*3);
  for(let i=0;i<sp.length;i++)sp[i]=(Math.random()-.5)*3200;
  sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0x6fd0e0,size:1.5,transparent:true,opacity:.6})));

  buildBrain();
  clock=new THREE.Clock();

}

/* ---- the central neural-brain GLB (audio-reactive) ---- */
function buildBrain(){
  brain=new THREE.Group();scene.add(brain);
  const loader=new THREE.GLTFLoader();
  function loadGLB(file,onLoad){glbsTried++;
    loader.load(ASSET(file),g=>{glbsOk++;try{onLoad(g.scene);}catch(e){}},
      undefined,()=>{ if(glbsOk===0 && glbsTried>=3 && !fellBack) brainFallback(); });}
  loadGLB('jarvis_projector_dais.glb',s=>{s.position.y=-26;s.scale.setScalar(20);brain.add(s);});
  loadGLB('jarvis_fusion_reactor_core.glb',s=>{s.scale.setScalar(16);
    s.traverse(o=>{if(o.isMesh&&o.material){o.material.emissive=new THREE.Color(0x29e7ff);if('emissiveIntensity' in o.material)o.material.emissiveIntensity=1.2;}});
    coreMesh=s;brain.add(s);});
  loadGLB('jarvis_fusion_core_containment_torus.glb',s=>{s.scale.setScalar(24);torus=s;brain.add(s);});
  // volumetric beam up through the dais
  beamMat=new THREE.MeshBasicMaterial({color:0x29e7ff,transparent:true,opacity:.12,
    blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
  const beam=new THREE.Mesh(new THREE.ConeGeometry(16,100,32,1,true),beamMat);
  beam.position.y=26;beam.rotation.x=Math.PI;brain.add(beam);
}
function brainFallback(){fellBack=true;
  const ico=new THREE.Mesh(new THREE.IcosahedronGeometry(22,1),
    new THREE.MeshStandardMaterial({color:0x0a3a4a,emissive:0x29e7ff,emissiveIntensity:1.0,metalness:.9,roughness:.2}));
  coreMesh=ico;brain.add(ico);
}

/* ---- selectable bodies + deterministic layout + sprite labels ---- */
function makeLabel(text){
  const c=document.createElement('canvas');c.width=256;c.height=64;
  const x=c.getContext('2d');x.font='600 26px Inter,system-ui,monospace';x.fillStyle='#eafcff';
  x.textAlign='center';x.textBaseline='middle';x.shadowColor='#29e7ff';x.shadowBlur=8;x.fillText(text,128,34);
  const tx=new THREE.CanvasTexture(c);tx.needsUpdate=true;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tx,transparent:true,depthWrite:false,depthTest:false}));
  sp.scale.set(36,9,1);return sp;
}
function setLabel(mesh,text){
  const sp=mesh.userData.label;if(!sp)return;
  const c=document.createElement('canvas');c.width=256;c.height=64;
  const x=c.getContext('2d');x.font='600 26px Inter,system-ui,monospace';x.fillStyle='#eafcff';
  x.textAlign='center';x.textBaseline='middle';x.shadowColor='#29e7ff';x.shadowBlur=8;x.fillText(text,128,34);
  if(sp.material.map)sp.material.map.dispose();
  sp.material.map=new THREE.CanvasTexture(c);sp.material.needsUpdate=true;
}
function addBody(o){ // {name,label,color,radius,angle,y,size,getCard}
  const sz=o.size||4.4;
  const m=new THREE.Mesh(new THREE.SphereGeometry(sz,24,24),
    new THREE.MeshStandardMaterial({color:o.color,emissive:o.color,emissiveIntensity:1.0,metalness:.4,roughness:.3}));
  m.position.set(Math.cos(o.angle)*o.radius,o.y||0,Math.sin(o.angle)*o.radius);
  m.userData={name:o.name,base:1.0,ph:Math.random()*6.28,getCard:o.getCard,refresh:null,selected:false};
  const lab=makeLabel(o.label);lab.position.set(0,sz+4,0);m.add(lab);m.userData.label=lab;
  scene.add(m);bodies.push(m);bodyMap.set(o.name,m);return m;
}
function upsertBody(name,createFn,updateFn){
  let m=bodyMap.get(name);
  if(!m){m=createFn();}
  if(updateFn)updateFn(m);
  return m;
}
function setBodyColor(m,color){m.material.color.setHex(color);m.material.emissive.setHex(color);}

/* ---- constellation from /graphdata (instanced spheres + line segments, fixed layout) ---- */
let _constellation=null;
function buildConstellation(){
  fetch('graphdata').then(r=>r.json()).then(d=>{
    if(!scene)return;
    const nodes=d.nodes||[],N=nodes.length;if(!N)return;const R=330;
    const geo=new THREE.SphereGeometry(2.4,10,10);
    const mat=new THREE.MeshBasicMaterial();
    const inst=new THREE.InstancedMesh(geo,mat,N);
    const m4=new THREE.Matrix4(),idx={},pos=[];
    nodes.forEach((n,i)=>{const phi=Math.acos(1-2*(i+.5)/N),th=Math.PI*(1+Math.sqrt(5))*i;
      const p=new THREE.Vector3(Math.cos(th)*Math.sin(phi),Math.cos(phi),Math.sin(th)*Math.sin(phi)).multiplyScalar(R);
      pos[i]=p;idx[n.id]=i;m4.setPosition(p);inst.setMatrixAt(i,m4);
      try{inst.setColorAt(i,new THREE.Color(n.color||0x9bd4e6));}catch(e){}});
    inst.instanceMatrix.needsUpdate=true;if(inst.instanceColor)inst.instanceColor.needsUpdate=true;
    scene.add(inst);
    const lp=[];(d.edges||[]).forEach(e=>{if(idx[e.s]!=null&&idx[e.t]!=null){
      lp.push(...pos[idx[e.s]].toArray(),...pos[idx[e.t]].toArray());}});
    const lg=new THREE.BufferGeometry();lg.setAttribute('position',new THREE.Float32BufferAttribute(lp,3));
    scene.add(new THREE.LineSegments(lg,new THREE.LineBasicMaterial({color:0x5faad2,transparent:true,opacity:0.12})));
    _constellation={inst,idx,pos,nodes};
  }).catch(e=>{console.warn('graphdata',e);});
}

/* ---- camera fly-to / return tweening (no extra lib) ---- */
let userDragging=false;
function tween(toPos,toTgt,ms,then){flying=true;const p0=camera.position.clone(),t0=controls.target.clone(),t=performance.now();
  (function step(){const k=Math.min(1,(performance.now()-t)/(ms||900));const e=k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
    camera.position.lerpVectors(p0,toPos,e);controls.target.lerpVectors(t0,toTgt,e);controls.update();
    if(k<1)requestAnimationFrame(step);else{flying=false;if(then)then();}})();}
function flyToBody(b){const bp=b.position.clone();const dir=camera.position.clone().sub(bp);
  if(dir.lengthSq()<1)dir.set(0,0,1);dir.normalize();
  tween(bp.clone().add(dir.multiplyScalar(46)),bp);}
function flyHome(){tween(home.pos.clone(),home.tgt.clone(),800);}
function flyToNode(label){if(!_constellation)return false;
  const ns=_constellation.nodes,lo=(label||'').toLowerCase();
  let i=ns.findIndex(n=>(n.label||'').toLowerCase()===lo||String(n.id).toLowerCase()===lo||(n.type||'').toLowerCase()===lo);
  if(i<0)i=ns.findIndex(n=>(n.label||'').toLowerCase().includes(lo));
  if(i<0)return false;const p=_constellation.pos[i];
  const dir=camera.position.clone().sub(p).normalize();
  tween(p.clone().add(dir.multiplyScalar(30)),p);
  showCard({title:ns[i].label||ns[i].id,subtitle:(ns[i].type||'node')+' · knowledge graph',
    actions:[{label:'◈ Open full graph',kind:'url',arg:'graph?focus='+encodeURIComponent(ns[i].label||ns[i].id)}]});
  return true;}
function flyToQuery(q){q=(q||'').trim();if(!q)return;const lo=q.toLowerCase();
  // try a body label first
  for(const b of bodies){const sp=b.userData.label;
    if(b.userData.name.toLowerCase().includes(lo)){selectBody(b);return;}}
  // then a constellation node
  if(flyToNode(q))return;
  // else hand to chat
  $('say').value=q;askJarvis();}

/* ---- raycast click → select body (fly + card) / empty → return ---- */
const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
let _downXY=null;
function onCanvasClick(e){
  if(!uniReady)return;
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,camera);
  const hit=ray.intersectObjects(bodies,true)[0];
  if(hit){let o=hit.object;while(o&&!o.userData.name)o=o.parent;if(o)selectBody(o);}
  else{closeCard();}
}
function selectBody(b){
  if(_selected)_selected.userData.selected=false;
  _selected=b;b.userData.selected=true;
  flyToBody(b);
  const gc=b.userData.getCard;
  if(gc){const o=gc();
    // refresh the card live on each tick while this body stays selected
    b.userData.refresh=()=>{ if(_selected===b){const oo=b.userData.getCard&&b.userData.getCard();if(oo)showCardKeepActions(oo);} };
    // handle special card actions that route to overlays
    if(o.actions)o.actions=o.actions.map(a=>{
      if(a.kind==='open'&&a.arg==='#guardian')return {label:a.label,kind:'_fn',fn:()=>setMode('guardian')};
      if(a.kind==='open'&&a.arg==='#studio')return {label:a.label,kind:'_fn',fn:()=>setMode('library')};
      return a;});
    showCardWithFns(o);
  }
}
function showCardWithFns(o){
  showCard(o);
  // rebind _fn actions (showCard wired doAction; override those that are functions)
  const acts=o.actions||[];const els=$('card').querySelector('.acts').querySelectorAll('.act');
  acts.forEach((a,i)=>{if(a.kind==='_fn'&&els[i])els[i].onclick=a.fn;});
}
function showCardKeepActions(o){ // live refresh of props/bar without disturbing focus
  cardEl('.t').textContent=o.title||'';cardEl('.s').textContent=o.subtitle||'';
  cardEl('.props').innerHTML=(o.props||[]).map(p=>'<div class=prop><span class=k>'+esc(p.k)+'</span><b>'+esc(String(p.v))+'</b></div>').join('');
  let lines=(o.lines||[]).map(l=>'<div class=l>'+esc(l)+'</div>').join('');
  if(o.bar!=null)lines+='<div class=bar2><div class=fill style="width:'+Math.max(0,Math.min(100,o.bar))+'%"></div></div>';
  cardEl('.lines').innerHTML=lines;
}

/* ---- the render loop — NEVER throws (guarded) ---- */
function tickFrame(){
  requestAnimationFrame(tickFrame);
  if(!renderer)return;
  try{
    const dt=clock.getDelta(),t=clock.elapsedTime,amp=currentAmp();
    if(coreMesh){coreMesh.rotation.y+=dt*0.3;
      coreMesh.scale.setScalar((fellBack?22:16)*(1+amp*0.18));
      coreMesh.traverse(o=>{if(o.isMesh&&o.material&&'emissiveIntensity' in o.material)o.material.emissiveIntensity=0.8+amp*2.4;});}
    if(torus){torus.rotation.z+=dt*0.5;torus.rotation.x+=dt*0.12;}
    if(beamMat)beamMat.opacity=0.06+amp*0.22;
    if(bloom)bloom.strength=1.3+amp*0.9;
    for(const b of bodies){
      b.material.emissiveIntensity=(b.userData.selected?1.8:b.userData.base)+Math.sin(t*2+b.userData.ph)*0.18;
    }
    if(!userDragging&&!flying){const rad=Math.hypot(camera.position.x,camera.position.z);
      const a=Math.atan2(camera.position.x,camera.position.z)+dt*0.04;
      camera.position.x=Math.sin(a)*rad;camera.position.z=Math.cos(a)*rad;}
    controls.update();
    if(composer)composer.render();else renderer.render(scene,camera);
  }catch(e){ /* never blank the page */ }
}

/* ================= boot ================= */
function engage(){if(_engaged)return;_engaged=true;
  unlockAudio();                                            // unlock playback within the user gesture
  // greet BEFORE any camera work (preserved ordering)
  setTimeout(()=>jarvisSpeak('JARVIS online. All systems live. How can I help?'),700);
  $('boot').classList.add('gone');setTimeout(()=>{$('boot').style.display='none';},950);
  if(!uniReady){const ok=initUniverse();if(!ok){$('boot').querySelector('.t').textContent='WebGL UNAVAILABLE';$('boot').classList.remove('gone');$('boot').style.display='flex';$('boot').querySelector('.tap').textContent='voice + chat still work below';$('boot').style.pointerEvents='none';}}
}
addEventListener('pointerdown',engage,{once:true});

// start data loops immediately; build the scene on first gesture (autoplay policy) OR auto after 2.2s
tick();setInterval(tick,2500);setInterval(ageTick,1000);budgetTick();setInterval(budgetTick,8000);loadLib();setInterval(loadLib,15000);
setTimeout(()=>{if(!_engaged){$('boot').classList.add('gone');setTimeout(()=>{$('boot').style.display='none';if(!uniReady)initUniverse();},950);_engaged=true;unlockAudio();}},2200);
</script>
