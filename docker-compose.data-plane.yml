# Data-plane local stack for the Enterprise OS.
#
# Provides the object-store and retrieval substrates for the multimodal data plane,
# lakehouse, and search/graph/vector layers (Layers 3/4/9). MinIO and OpenSearch run
# in a lightweight sandbox. Spark and Flink are heavy distributed engines and are
# kept as commented placeholders — they require real infra.
#
# See docs/SOVEREIGN_PLATFORM_BLUEPRINT.md and data-plane/TARGET_RUNTIME.md.

name: enterprise-os-data-plane

services:
  minio:
    # Layer 4 lakehouse object store (Iceberg over S3-compatible storage) per ADR-004.
    # MinIO is the local S3 substitute and runs fine in a sandbox.
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: enterprise
      MINIO_ROOT_PASSWORD: enterprise123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  opensearch:
    # Layer 9 search / retrieval substrate. Single-node, security disabled for local
    # dev; this is a lightweight-sandbox-friendly configuration.
    image: opensearchproject/opensearch:2.14.0
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # spark:
  #   # Layer 3/4/5 heavy + ER batch processing (Scala/Java on Spark).
  #   # Layer B: requires real infra (Spark cluster, driver/executors, Iceberg catalog).
  #   image: apache/spark:3.5.1
  #   command: ["/opt/spark/sbin/start-master.sh"]
  #   ports:
  #     - "7077:7077"
  #     - "8081:8080"

  # flink:
  #   # Layer 3 streaming data processing (Flink).
  #   # Layer B: requires real infra (Flink JobManager/TaskManager cluster).
  #   image: flink:1.19.0
  #   command: ["jobmanager"]
  #   ports:
  #     - "8082:8081"

volumes:
  minio-data:
  opensearch-data:
