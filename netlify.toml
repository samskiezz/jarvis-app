# Netlify deploy config for the Jarvis Palantir frontend (Vite SPA).
[build]
  command = "npm run build"
  publish = "dist"

# Client-side routing: every path falls back to index.html so deep links
# (e.g. /KGIK-Brain, /Investment-Tracker) resolve to the SPA.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set VITE_API_BASE_URL (and optionally VITE_API_KEY) in the Netlify UI
# under Site settings → Environment variables, pointing at your deployed
# FastAPI backend (server/). Without it the app falls back to localhost:8000.
[build.environment]
  NODE_VERSION = "20"
