openapi: 3.1.0
info:
  title: Ontology API
  version: 1.0.0
  description: >
    The operational ontology kernel (Palantir Ontology-class). Defines the
    *schema of the enterprise*: object-types, property-types, link-types,
    action-types and function-types, plus source-mappings that bind ontology
    concepts to upstream data, SDK generation and ontology versioning.


    This is the design-time / authoring surface; live instances are served by the
    Object Runtime API. It exposes platform concepts (typed objects, governed
    transitions) — never raw database tables.


    Production language: Java / Spring Boot (Layer B service `ontology`).


    Layer A reference module: `server/services/jarvis_ontology.py` (with
    `server/services/ontology_ext.py` / `ontology_store.py`), exposed under
    `/v1/jarvis`. The contract is stable across the Layer A -> Layer B split.
servers:
  - url: /v1/ontology
    description: Layer B production service mount
  - url: /v1/jarvis
    description: Layer A reference kernel (this repo)
tags:
  - name: object-types
    description: Typed objects with a property schema and a lifecycle
  - name: property-types
    description: Reusable typed properties carrying classification labels
  - name: link-types
    description: Governed relationship types between object-types
  - name: action-types
    description: Governed lifecycle transitions bound to a permission and risk tier
  - name: function-types
    description: Derived/computed functions over the ontology
  - name: source-mappings
    description: Bindings from ontology concepts to upstream data sources
  - name: sdk
    description: Typed SDK generation from the ontology
  - name: versioning
    description: Ontology version snapshots and diffs
paths:
  /object-types:
    get:
      tags: [object-types]
      summary: List object-types
      responses:
        '200':
          description: Object-types
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ObjectType' }
    post:
      tags: [object-types]
      summary: Define an object-type (schema + lifecycle)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ObjectType' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObjectType' }
  /object-types/{typeId}:
    get:
      tags: [object-types]
      summary: Get an object-type
      parameters:
        - { name: typeId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Object-type
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObjectType' }
  /property-types:
    get:
      tags: [property-types]
      summary: List property-types
      responses:
        '200':
          description: Property-types
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PropertyType' }
    post:
      tags: [property-types]
      summary: Define a property-type
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PropertyType' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PropertyType' }
  /link-types:
    get:
      tags: [link-types]
      summary: List link-types
      responses:
        '200':
          description: Link-types
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LinkType' }
    post:
      tags: [link-types]
      summary: Define a link-type (from_type -> to_type)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LinkType' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LinkType' }
  /action-types:
    get:
      tags: [action-types]
      summary: List action-types
      responses:
        '200':
          description: Action-types
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ActionType' }
    post:
      tags: [action-types]
      summary: Define an action-type (governed transition)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActionType' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionType' }
  /function-types:
    get:
      tags: [function-types]
      summary: List function-types
      responses:
        '200':
          description: Function-types
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FunctionType' }
    post:
      tags: [function-types]
      summary: Define a function-type (derived value over the ontology)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FunctionType' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FunctionType' }
  /source-mappings:
    get:
      tags: [source-mappings]
      summary: List source-mappings
      responses:
        '200':
          description: Source-mappings
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SourceMapping' }
    post:
      tags: [source-mappings]
      summary: Bind an ontology concept to an upstream source
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SourceMapping' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SourceMapping' }
  /sdk/generate:
    post:
      tags: [sdk]
      summary: Generate a typed SDK from the current ontology
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SdkGenerationRequest' }
      responses:
        '202':
          description: Generation job
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SdkGenerationJob' }
  /versions:
    get:
      tags: [versioning]
      summary: List ontology version snapshots
      responses:
        '200':
          description: Versions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/OntologyVersion' }
  /versions/{from}/diff/{to}:
    get:
      tags: [versioning]
      summary: Diff two ontology versions
      parameters:
        - { name: from, in: path, required: true, schema: { type: string } }
        - { name: to, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Ontology diff
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OntologyDiff' }
components:
  schemas:
    Classification:
      type: string
      enum: [UNCLASSIFIED, OFFICIAL, SECRET, TOPSECRET]
    ObjectType:
      type: object
      required: [apiName, properties]
      properties:
        apiName: { type: string }
        displayName: { type: string }
        properties:
          type: array
          items: { $ref: '#/components/schemas/PropertyRef' }
        states:
          type: array
          items: { type: string }
        initialState: { type: string }
        titleProperty: { type: string }
        classification: { $ref: '#/components/schemas/Classification' }
    PropertyRef:
      type: object
      required: [name, propertyTypeId]
      properties:
        name: { type: string }
        propertyTypeId: { type: string }
        required: { type: boolean, default: false }
    PropertyType:
      type: object
      required: [apiName, baseType]
      properties:
        apiName: { type: string }
        baseType: { type: string, enum: [string, integer, double, boolean, timestamp, geo, array, struct] }
        classification: { $ref: '#/components/schemas/Classification' }
        pii: { type: boolean, default: false }
    LinkType:
      type: object
      required: [apiName, fromType, toType]
      properties:
        apiName: { type: string }
        fromType: { type: string }
        toType: { type: string }
        cardinality: { type: string, enum: [one-to-one, one-to-many, many-to-many], default: many-to-many }
    ActionType:
      type: object
      required: [apiName, objectType, fromState, toState, requiredPermission]
      properties:
        apiName: { type: string }
        objectType: { type: string }
        fromState: { type: string }
        toState: { type: string }
        requiredPermission: { type: string }
        riskTier: { type: string, enum: [low, medium, high], default: low }
        requiresApproval: { type: boolean, default: false }
    FunctionType:
      type: object
      required: [apiName, returnType]
      properties:
        apiName: { type: string }
        description: { type: string }
        inputs:
          type: array
          items: { $ref: '#/components/schemas/PropertyRef' }
        returnType: { type: string }
        runtime: { type: string, enum: [expression, python, java, sql], default: expression }
    SourceMapping:
      type: object
      required: [objectType, sourceRef]
      properties:
        objectType: { type: string }
        sourceRef: { type: string, description: Logical dataset/connector handle (never a raw table) }
        propertyBindings:
          type: object
          additionalProperties: { type: string }
        syncMode: { type: string, enum: [batch, streaming, snapshot], default: batch }
    SdkGenerationRequest:
      type: object
      required: [language]
      properties:
        language: { type: string, enum: [typescript, python, java] }
        ontologyVersion: { type: string, nullable: true }
    SdkGenerationJob:
      type: object
      properties:
        jobId: { type: string }
        status: { type: string, enum: [queued, running, succeeded, failed] }
        artifactUrl: { type: string, nullable: true }
    OntologyVersion:
      type: object
      properties:
        version: { type: string }
        createdAt: { type: string, format: date-time }
        author: { type: string }
        note: { type: string }
    OntologyDiff:
      type: object
      properties:
        from: { type: string }
        to: { type: string }
        added:
          type: array
          items: { type: string }
        removed:
          type: array
          items: { type: string }
        changed:
          type: array
          items: { type: string }
