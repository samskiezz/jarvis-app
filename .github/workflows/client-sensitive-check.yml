name: Client Sensitive Pattern Check

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  scan-client-patterns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check:client-sensitive
