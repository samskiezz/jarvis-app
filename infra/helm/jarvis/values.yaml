replicaCount: 2

image:
  repository: jarvis-backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

env:
  HISTORY_INGEST_ENABLED: "false"
  AUTOBUILD_ON_START: "false"
  ENRICH_LOOP: "false"
  FORGE_SCHEDULE_ENABLED: "false"
  PROACTIVE_LOOP_ENABLED: "false"

persistence:
  enabled: true
  size: 10Gi
  mountPath: /app/data

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true

probes:
  liveness:
    path: /v1/health
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    path: /v1/health
    initialDelaySeconds: 5
    periodSeconds: 5
