# Default values for the fleet-agent chart. Deployed as a DaemonSet on edge
# nodes so every node runs a local agent.
image:
  repository: registry.internal/jarvis/fleet-agent
  tag: "0.1.0"
  pullPolicy: IfNotPresent

namespace: fleet

deploymentKind: DaemonSet

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  readOnlyRootFilesystem: true

sync:
  centralEndpoint: https://jarvis-prod.control.internal
  intervalSeconds: 60
  offlineBufferEnabled: true

localCache:
  bucket: jarvis-edge-cache
  sizeLimitGi: 10
