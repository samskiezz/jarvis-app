# cert-manager issuers for the Jarvis platform. A self-signed root bootstraps
# an internal CA used to issue mTLS certs across planes.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: jarvis-internal-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: jarvis-internal-ca
  secretName: jarvis-internal-ca-key-pair
  duration: 87600h
  privateKey:
    algorithm: ECDSA
    size: 384
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: jarvis-ca-issuer
spec:
  ca:
    secretName: jarvis-internal-ca-key-pair
