# SPIRE Server configuration (HCL-style format used by spire-server).
# Issues SPIFFE SVIDs that establish workload identity across the platform.
# NOTE: requires a real SPIRE deployment + datastore; trust domain is a sample.

server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    trust_domain = "jarvis.internal"
    data_dir = "/opt/spire/data/server"
    log_level = "INFO"
    ca_ttl = "24h"
    default_x509_svid_ttl = "1h"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "postgres"
            # NOTE: point at the real platform postgres instance.
            connection_string = "postgresql://spire@jarvis-prod.postgres.internal:5432/spire"
        }
    }

    NodeAttestor "k8s_psat" {
        plugin_data {
            clusters = {
                "jarvis-prod" = {
                    service_account_allow_list = ["spire:spire-agent"]
                }
            }
        }
    }

    KeyManager "disk" {
        plugin_data {
            keys_path = "/opt/spire/data/server/keys.json"
        }
    }
}
