# Prometheus scrape configuration for the Jarvis platform.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: jarvis-os

scrape_configs:
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

  - job_name: control-plane
    static_configs:
      - targets:
          - control-plane.control-plane.svc:8080

  - job_name: ontology-plane
    static_configs:
      - targets:
          - ontology-plane.ontology-plane.svc:8081

  - job_name: aip-plane
    static_configs:
      - targets:
          - aip-plane.aip-plane.svc:8082

# NOTE: configure a real remote_write target (AMP/Grafana Cloud) for HA.
remote_write:
  - url: https://jarvis-prod.metrics.internal/api/v1/remote_write
