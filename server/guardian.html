<!doctype html><html lang=en><head><meta charset=utf-8>
<title>JARVIS · Guardian Monitor</title>
<meta name=viewport content="width=device-width,initial-scale=1">
<style>
:root{--cy:#22d3ee;--ok:#34d399;--warn:#fbbf24;--bad:#f87171}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:#02040a;color:#eafcff;font-family:ui-rounded,system-ui,Segoe UI,Roboto,sans-serif;overflow:hidden}
#bg{position:fixed;inset:0;background:radial-gradient(900px 600px at 50% -10%,#0a2433,#02040a 60%);z-index:0}
#wrap{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;padding:10px;gap:8px}
.bar{display:flex;align-items:center;gap:10px}
.orb{width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#a8f0ff,#22d3ee 55%,#0b6b86);box-shadow:0 0 18px #22d3eecc;flex:none}
.bar h1{font-size:14px;letter-spacing:1.5px;margin:0;color:#bdf3ff}
#pill{margin-left:auto;font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;background:#0c2331;border:1px solid #1d4a63;color:var(--warn)}
#pill.ok{color:var(--ok);border-color:#1c5b46;box-shadow:0 0 14px #34d39955}
#pill.bad{color:var(--bad);border-color:#5b1c1c}
#stage{position:relative;flex:1;border-radius:16px;overflow:hidden;background:#04101a;border:1px solid #103247;min-height:160px}
#remote{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#04101a}
#remoteOff{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#4b6b7e;text-align:center;padding:16px;font-size:14px}
#selfBox{position:absolute;right:10px;bottom:10px;width:30%;max-width:150px;aspect-ratio:3/4;border-radius:12px;overflow:hidden;border:2px solid #22d3ee88;background:#03222e}
#self{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#tag{position:absolute;left:10px;top:9px;font-size:11px;color:#bdf3ff;background:#02131bcc;border:1px solid #18415a;padding:4px 10px;border-radius:999px}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.b{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:56px;border-radius:12px;border:1px solid #1d4a63;background:linear-gradient(180deg,#0a2230,#06151f);color:#dff6ff;font-size:11px;font-weight:700;cursor:pointer}
.b .ic{font-size:20px}.b:active{transform:scale(.95)}
.b.on{border-color:#1c5b46;color:#9af7cf}.b.off{border-color:#5b1c1c;color:#ffb4b4}
.talk{grid-column:1/3;background:linear-gradient(180deg,#0c3a2c,#072018);border-color:#1c5b46;min-height:56px}
.talk.live{background:linear-gradient(180deg,#34d399,#0b6b4a);color:#021018;box-shadow:0 0 22px #34d39988}
.saybar{display:flex;gap:7px}
.saybar input{flex:1;background:#06151f;border:1px solid #1d4a63;border-radius:12px;color:#eafcff;padding:0 12px;font-size:14px;min-height:46px}
.saybar button{min-width:64px;border-radius:12px;border:none;background:linear-gradient(180deg,#33e0ff,#0b86a6);color:#021018;font-weight:800;cursor:pointer}
#sosOv{position:fixed;inset:0;z-index:40;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#2a0606ee;text-align:center;padding:24px}
#sosOv.show{display:flex;animation:flash 1s steps(2) infinite}
@keyframes flash{50%{background:#5a0a0aee}}
#sosOv h2{font-size:30px;color:#fff;margin:0}
#sosOv button{min-height:70px;min-width:220px;font-size:18px;font-weight:800;border:none;border-radius:18px;background:#fff;color:#7a0d0d;cursor:pointer}
#gate{position:fixed;inset:0;z-index:30;background:radial-gradient(800px 600px at 50% 35%,#0a2433,#02040a 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:24px}
#gate button{min-width:220px;min-height:64px;font-size:17px;font-weight:800;border:none;border-radius:18px;background:linear-gradient(180deg,#33e0ff,#0b86a6);color:#021018;cursor:pointer}
#gate p{color:#7fb0c4;max-width:380px;font-size:13px;margin:4px}
</style></head>
<body>
<div id=bg></div>
<div id=wrap>
 <div class=bar><div class=orb></div><h1>GUARDIAN MONITOR</h1><span id=rm style="font-size:11px;color:#5f7e94"></span><div id=pill>idle</div></div>
 <div id=stage>
  <video id=remote autoplay playsinline></video>
  <div id=remoteOff>📡 Waiting for the link…<div style="font-size:12px;color:#37566a">Your loved one's camera will appear here.</div></div>
  <div id=tag>Watching</div>
  <div id=selfBox><video id=self autoplay playsinline muted></video></div>
 </div>
 <div class=row>
  <button class="b on" id=hcam onclick="ctl('cam')"><span class=ic>📷</span>Her Camera</button>
  <button class="b on" id=hmic onclick="ctl('mic')"><span class=ic>🎙️</span>Her Mic</button>
  <button class=b onclick="ctl('flip')"><span class=ic>🔄</span>Flip Hers</button>
  <button class=b id=myc onclick="toggleMyCam()"><span class=ic>👁️</span>My Cam</button>
 </div>
 <div class=row>
  <button class="b talk" id=talk onpointerdown="talk(true)" onpointerup="talk(false)" onpointerleave="talk(false)"><span class=ic>🗣️</span>Hold to Talk</button>
  <button class=b id=mymic onclick="toggleMyMic()"><span class=ic>🔈</span>My Mic</button>
  <button class=b onclick="ring()"><span class=ic>📞</span>Ring Her</button>
 </div>
 <div class=saybar>
  <input id=say placeholder="Type — Jarvis speaks it to her in his voice…" onkeydown="if(event.key==='Enter')sayIt()">
  <button onclick="sayIt()">Speak</button>
 </div>
</div>
<div id=sosOv><h2>🆘 SHE NEEDS HELP</h2><div id=sostime style="color:#ffd"></div><button onclick="ackSos()">I'M COMING — ACKNOWLEDGE</button></div>
<div id=gate>
 <div class=orb style="width:46px;height:46px"></div>
 <h2 style="color:#bdf3ff;margin:0">Guardian Monitor</h2>
 <p>Connect to see and hear your loved one, talk to them, and keep them safe. You'll be alerted instantly if they press help.</p>
 <button onclick="begin()">CONNECT NOW</button>
</div>
<script>
const ROOM=(new URLSearchParams(location.search).get('room')||'mum').toLowerCase();
const ROLE='guardian';
document.getElementById('rm').textContent='· '+ROOM;
const ICE=[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:global.stun.twilio.com:3478'},
 {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},
 {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'},
 {urls:'turn:openrelay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayproject'}];
let pc,local,since=0,pendingIce=[],haveRemote=false,connected=false,hcam=true,hmic=true,offering=false,offerSent=false;
let everSeen=false,lastOnline=0,offAlarmed=false,polling=false;
let VOICES=[];function lv(){VOICES=speechSynthesis.getVoices()||[];}lv();if('onvoiceschanged' in speechSynthesis)speechSynthesis.onvoiceschanged=lv;
function pickVoice(){const pref=['Daniel','Google UK English Male','Microsoft Ryan','Microsoft George','Arthur'];for(const p of pref){const v=VOICES.find(v=>v.name&&v.name.includes(p));if(v)return v;}return VOICES.find(v=>/en[-_]?GB/i.test(v.lang))||VOICES[0];}
function jarvis(t){try{const u=new SpeechSynthesisUtterance(t);const v=pickVoice();if(v){u.voice=v;u.lang=v.lang;}else u.lang='en-GB';u.rate=.98;u.pitch=.9;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
function pill(t,c){const p=document.getElementById('pill');p.textContent=t;p.className=c||'';}
async function sig(kind,payload){try{await fetch('rtc',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({room:ROOM,from:ROLE,to:'patient',kind:kind,payload:payload})});}catch(e){}}
async function getMedia(){return await navigator.mediaDevices.getUserMedia({audio:true,video:{facingMode:'user',width:{ideal:1280}}});}
function ctl(what){if(what==='cam'){hcam=!hcam;document.getElementById('hcam').className='b '+(hcam?'on':'off');sig('ctrl',{cam:hcam});}
 else if(what==='mic'){hmic=!hmic;document.getElementById('hmic').className='b '+(hmic?'on':'off');sig('ctrl',{mic:hmic});}
 else if(what==='flip')sig('ctrl',{flip:true});}
function ring(){sig('ctrl',{ring:true});jarvis('Ringing her now.');pill('ringing…','');}
function sayIt(){const i=document.getElementById('say');const t=i.value.trim();if(!t)return;sig('ctrl',{speak:t});i.value='';pill('spoke to her','ok');}
function toggleMyCam(){const t=local&&local.getVideoTracks()[0];if(t){t.enabled=!t.enabled;document.getElementById('myc').className='b '+(t.enabled?'on':'off');}}
function toggleMyMic(){const t=local&&local.getAudioTracks()[0];if(t){t.enabled=!t.enabled;document.getElementById('mymic').className='b '+(t.enabled?'on':'off');}}
let talking=false;function talk(on){talking=on;const t=local&&local.getAudioTracks()[0];if(t)t.enabled=on||(document.getElementById('mymic').className.includes('on'));document.getElementById('talk').className='b talk'+(on?' live':'');}
function newPeer(){if(pc){try{pc.close()}catch(e){}}pendingIce=[];haveRemote=false;
 pc=new RTCPeerConnection({iceServers:ICE});local.getTracks().forEach(t=>pc.addTrack(t,local));
 pc.onicecandidate=e=>{if(e.candidate)sig('ice',e.candidate);};
 pc.ontrack=e=>{const r=document.getElementById('remote');r.srcObject=e.streams[0];document.getElementById('remoteOff').style.display='none';};
 pc.onconnectionstatechange=()=>{const s=pc.connectionState;if(s==='connected'){connected=true;pill('● LIVE','ok');jarvis('You are connected. You can see and hear her.');}
   else if(s==='failed'||s==='disconnected'){connected=false;offerSent=false;pill('reconnecting…','');document.getElementById('remoteOff').style.display='flex';}};}
// Make exactly ONE offer per peer. `offerSent` latches until the connection actually drops, so the
// 800ms poll loop can't keep tearing down `pc` (newPeer) and clobbering the offer the patient just answered.
async function makeOffer(){if(offering||offerSent||connected)return;offering=true;
 try{newPeer();const o=await pc.createOffer();await pc.setLocalDescription(o);sig('offer',o);offerSent=true;pill('calling her…','');}
 catch(e){offerSent=false;}offering=false;}
async function onMsg(m){const k=m.kind,p=m.payload;
 // only apply the answer to the pc that is actually waiting for one (guards the racing duplicate poll)
 if(k==='answer'){if(pc&&pc.signalingState==='have-local-offer'){try{await pc.setRemoteDescription(p);haveRemote=true;
   for(const c of pendingIce){try{await pc.addIceCandidate(c)}catch(e){}}pendingIce=[];}catch(e){}}}
 else if(k==='ice'){if(pc&&haveRemote){try{await pc.addIceCandidate(p)}catch(e){}}else pendingIce.push(p);}
 else if(k==='hello'){if(!connected)makeOffer();if(p&&p.sos)showSos();}
 else if(k==='ctrl'){if(p&&p.sos)showSos();}}
function showSos(){const o=document.getElementById('sosOv');o.classList.add('show');document.getElementById('sostime').textContent='Alert received';jarvis('Attention. She needs help. She has pressed the help button.');try{siren()}catch(e){}}
function ackSos(){document.getElementById('sosOv').classList.remove('show');sig('ctrl',{speak:'Your family has seen your alert and is coming to help you now.'});}
let actx;function siren(){actx=actx||new(window.AudioContext||window.webkitAudioContext)();let t=actx.currentTime;for(let i=0;i<6;i++){const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.frequency.setValueAtTime(i%2?660:990,t);g.gain.value=.18;o.start(t);o.stop(t+.3);t+=.32;}}
async function poll(){try{const r=await fetch('rtc/poll?room='+ROOM+'&role='+ROLE+'&since='+since);const d=await r.json();since=d.seq||since;
 if(d.peer_online){everSeen=true;lastOnline=Date.now();
   if(offAlarmed){offAlarmed=false;document.getElementById('offOv').style.display='none';}
   if(!connected&&!offering&&local)makeOffer();else if(!connected&&!local)pill('she is online — tap Connect to see her','ok');}
 else if(!connected){pill(everSeen?'her device dropped…':'waiting for her…',everSeen?'bad':'');}
 for(const m of (d.msgs||[]))await onMsg(m);}catch(e){}finally{setTimeout(poll,800);}}
function startPolling(){if(polling)return;polling=true;poll();}
function dismissOff(){offAlarmed=false;document.getElementById('offOv').style.display='none';}
// DEAD-MAN'S SWITCH — if her device was online and then disappears for >40s, raise a loud alarm so you KNOW.
setInterval(()=>{
  if(everSeen&&!offAlarmed&&Date.now()-lastOnline>40000){offAlarmed=true;
    const ov=document.getElementById('offOv');document.getElementById('offsec').textContent=Math.round((Date.now()-lastOnline)/1000);
    ov.style.display='flex';jarvis("Warning. Your mother's device has gone offline. Please check on her now.");
    try{siren();setTimeout(siren,2200);setTimeout(siren,4400);}catch(e){}}
  if(offAlarmed)document.getElementById('offsec').textContent=Math.round((Date.now()-lastOnline)/1000);
},5000);
startPolling();  // monitoring + alarm run immediately on load, before you connect your own camera
async function begin(){try{document.getElementById('gate').style.display='none';pill('starting…','');local=await getMedia();
 document.getElementById('self').srcObject=local;const at=local.getAudioTracks()[0];if(at)at.enabled=false;document.getElementById('mymic').className='b off';
 jarvis('Guardian monitor active. Looking for her now.');startPolling();sig('hello',{role:ROLE});
}catch(e){pill('camera blocked','bad');jarvis('Please allow the camera and microphone.');document.getElementById('gate').style.display='flex';}}
</script>
</body></html>
